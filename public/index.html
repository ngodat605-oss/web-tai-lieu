<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hệ thống Tài liệu GLAM</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #ffcc00; --dark: #121212; --card: #1e1e1e; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white; margin: 0; }
        
        .header { background: var(--card); padding: 50px 20px; text-align: center; border-bottom: 5px solid var(--gold); }
        .company-vn { color: var(--gold); margin: 0; font-size: 38px; font-weight: bold; text-transform: uppercase; }
        .company-cn { color: var(--gold); margin: 10px 0 0; font-size: 26px; letter-spacing: 5px; }

        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        .breadcrumb { background: #252525; padding: 15px; border-radius: 8px; margin-bottom: 25px; color: var(--gold); border-left: 5px solid var(--gold); }
        .breadcrumb span { cursor: pointer; text-decoration: underline; margin-right: 8px; }

        .section-title { color: var(--gold); font-size: 20px; margin-bottom: 15px; text-transform: uppercase; border-bottom: 1px solid #333; padding-bottom: 10px; }
        
        /* Lưới thư mục ô vuông */
        .folder-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; margin-bottom: 50px; }
        .folder-box { background: var(--card); padding: 35px 15px; border-radius: 15px; text-align: center; border: 2px solid #333; cursor: pointer; transition: 0.3s; }
        .folder-box:hover { border-color: var(--gold); transform: translateY(-8px); background: #252525; }
        .folder-box i { font-size: 55px; color: var(--gold); margin-bottom: 15px; display: block; }
        .folder-name { font-weight: bold; font-size: 16px; word-break: break-all; }

        /* Bảng danh sách file */
        .file-list { background: #1a1a1a; border-radius: 12px; overflow: hidden; border: 1px solid #333; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #333; color: var(--gold); padding: 15px; text-align: left; }
        td { padding: 15px; border-bottom: 1px solid #222; }
        .btn-view { background: #007bff; color: white; padding: 8px 18px; border-radius: 5px; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="header">
    <div class="company-vn">CÔNG TY TNHH ĐIỆN TỬ GLAM</div>
    <div class="company-cn">格琳电子有限公司</div>
</div>

<div class="container">
    <div class="breadcrumb" id="bc">Vị trí: <span onclick="nav('')">Thư mục gốc</span></div>

    <div class="section-title">Thư mục</div>
    <div class="folder-grid" id="folder-area"></div>

    <div class="section-title">Tập tin tài liệu</div>
    <div class="file-list">
        <table>
            <thead>
                <tr>
                    <th>Tên tài liệu</th>
                    <th width="120">Thao tác</th>
                </tr>
            </thead>
            <tbody id="file-area"></tbody>
        </table>
    </div>
</div>

<script>
    let currentPath = "";

    async function nav(path) {
        currentPath = path;
        const bc = document.getElementById('bc');
        bc.innerHTML = 'Vị trí: <span onclick="nav(\'\')">Thư mục gốc</span>';
        let step = "";
        path.split('/').filter(p => p).forEach(p => {
            step += (step ? '/' : '') + p;
            bc.innerHTML += ` / <span onclick="nav('${step.replace(/'/g, "\\'")}')">${p}</span>`;
        });

        const res = await fetch(`/api/list/${encodeURIComponent(path)}`);
        const items = await res.json();
        const fArea = document.getElementById('folder-area');
        const tArea = document.getElementById('file-area');
        
        const folders = items.filter(i => i.isDir);
        const files = items.filter(i => !i.isDir);

        fArea.innerHTML = folders.map(f => {
            const p = currentPath ? `${currentPath}/${f.name}` : f.name;
            return `<div class="folder-box" onclick="nav('${p.replace(/'/g, "\\'")}')">
                        <i class="fas fa-folder"></i>
                        <div class="folder-name">${f.name}</div>
                    </div>`;
        }).join('');

        tArea.innerHTML = files.map(f => {
            const p = currentPath ? `${currentPath}/${f.name}` : f.name;
            return `<tr>
                        <td><i class="fas fa-file-pdf" style="margin-right:10px; color:red;"></i>${f.name}</td>
                        <td><a href="/api/view/${encodeURIComponent(p)}" target="_blank" class="btn-view">XEM</a></td>
                    </tr>`;
        }).join('');
        
        if(files.length === 0) tArea.innerHTML = '<tr><td colspan="2" style="text-align:center;color:#555;">Trống</td></tr>';
    }
    nav("");
</script>
</body>
</html>
