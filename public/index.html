<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Tài liệu GLAM - Đa tầng</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: sans-serif; background: #121212; color: white; margin: 0; }
        .header { background: #1e1e1e; padding: 20px; text-align: center; border-bottom: 3px solid #ffcc00; }
        .container { max-width: 1000px; margin: 20px auto; padding: 20px; }
        .breadcrumb { background: #222; padding: 10px; border-radius: 5px; margin-bottom: 20px; color: #ffcc00; }
        .breadcrumb span { cursor: pointer; text-decoration: underline; margin: 0 5px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
        .item { background: #1a1a1a; padding: 20px; border-radius: 10px; text-align: center; cursor: pointer; border: 1px solid #333; position: relative; }
        .item:hover { border-color: #ffcc00; }
        .item i { font-size: 40px; display: block; margin-bottom: 10px; }
        .fa-folder { color: #ffcc00; }
        .name { font-size: 13px; word-break: break-all; }
        .btn-del { position: absolute; top: 5px; right: 5px; color: red; background: none; border: none; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">
    <h1 style="color:#ffcc00; margin:0;">CÔNG TY TNHH ĐIỆN TỬ GLAM</h1>
</div>

<div class="container">
    <div class="breadcrumb" id="bc">Vị trí: <span onclick="nav('')">Gốc</span></div>
    <div class="grid" id="list"></div>
</div>

<script>
    let currentPath = "";

    async function nav(path) {
        currentPath = path;
        // Cập nhật thanh điều hướng
        const bc = document.getElementById('bc');
        bc.innerHTML = 'Vị trí: <span onclick="nav(\'\')">Gốc</span>';
        let temp = "";
        path.split('/').filter(p => p).forEach(p => {
            temp += (temp ? '/' : '') + p;
            const target = temp;
            bc.innerHTML += ` / <span onclick="nav('${target}')">${p}</span>`;
        });

        // Lấy dữ liệu
        const res = await fetch(`/api/list/${encodeURIComponent(path)}`);
        const items = await res.json();
        
        const div = document.getElementById('list');
        div.innerHTML = items.map(item => `
            <div class="item" onclick="${item.isDir ? `nav('${path ? path+'/'+item.name : item.name}')` : `view('${path ? path+'/'+item.name : item.name}')`}">
                <button class="btn-del" onclick="event.stopPropagation(); del('${path ? path+'/'+item.name : item.name}')">X</button>
                <i class="fas ${item.isDir ? 'fa-folder' : 'fa-file-alt'}"></i>
                <div class="name">${item.name}</div>
            </div>
        `).join('');
    }

    function view(p) { window.open(`/api/view/${encodeURIComponent(p)}`, '_blank'); }
    
    async function del(p) {
        if(confirm("Xóa mục này?")) {
            await fetch(`/api/delete/${encodeURIComponent(p)}`, { method: 'DELETE' });
            nav(currentPath);
        }
    }

    nav(""); // Chạy lần đầu
</script>
</body>
</html>
