<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mini Google Drive</title>
</head>
<body>

<h2>📁 Google Drive Mini</h2>

<input id="folder" placeholder="Tên thư mục">
<button onclick="openFolder()">Mở thư mục</button>

<hr>

<input type="file" id="file">
<button onclick="upload()">Upload</button>

<ul id="list"></ul>

<script>

let currentFolder = "default";

function openFolder() {
    currentFolder = document.getElementById("folder").value || "default";
    load();
}

async function upload() {
    let file = document.getElementById('file').files[0];

    let form = new FormData();
    form.append('file', file);

    await fetch('/upload/' + currentFolder, {
        method: 'POST',
        body: form
    });

    load();
}

async function load() {
    let res = await fetch('/files/' + currentFolder);
    let data = await res.json();

    let list = document.getElementById('list');
    list.innerHTML = '';

    data.forEach(f => {

        let url = `/file/${currentFolder}/${encodeURIComponent(f)}`;

        list.innerHTML += `
        <li>
            <a href="${url}">${f}</a>
            <button onclick="del('${f}')">X</button>
        </li>`;
    });
}

async function del(name) {
    await fetch(`/file/${currentFolder}/${encodeURIComponent(name)}`, {
        method: 'DELETE'
    });
    load();
}

load();

</script>

</body>
</html>
