<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hệ thống Tài liệu GLAM</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --glam-gold: #ffcc00; --dark-bg: #121212; --card-bg: #1e1e1e; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--dark-bg); color: white; margin: 0; padding-bottom: 50px; }
        
        /* TIÊU ĐỀ CÔNG TY */
        .header { background: var(--card-bg); padding: 45px 20px; text-align: center; border-bottom: 5px solid var(--glam-gold); box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .header h1 { color: var(--glam-gold); margin: 0; font-size: 38px; text-transform: uppercase; letter-spacing: 1px; }
        .header h2 { color: var(--glam-gold); margin: 10px 0 0; font-size: 26px; font-weight: normal; letter-spacing: 3px; }

        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        
        /* THANH DẪN ĐƯỜNG (BREADCRUMB) */
        .breadcrumb { background: #252525; padding: 15px 20px; border-radius: 10px; margin-bottom: 30px; color: var(--glam-gold); border-left: 6px solid var(--glam-gold); font-size: 18px; display: flex; align-items: center; }
        .breadcrumb i { margin-right: 10px; }
        .breadcrumb span { cursor: pointer; text-decoration: underline; margin-right: 8px; transition: 0.2s; }
        .breadcrumb span:hover { color: white; }

        /* KHU VỰC THƯ MỤC (DẠNG Ô VUÔNG LỚN) */
        .section-title { color: var(--glam-gold); font-size: 22px; margin-bottom: 20px; text-transform: uppercase; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .folder-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 25px; margin-bottom: 60px; }
        .folder-box { background: var(--card-bg); padding: 40px 20px; border-radius: 15px; text-align: center; border: 2px solid #333; cursor: pointer; transition: 0.3s ease; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .folder-box:hover { border-color: var(--glam-gold); transform: translateY(-10px); background: #262626; box-shadow: 0 10px 20px rgba(255, 204, 0, 0.2); }
        .folder-box i { font-size: 65px; color: var(--glam-gold); margin-bottom: 20px; display: block; }
        .folder-name { font-weight: bold; font-size: 18px; color: #fff; line-height: 1.4; word-break: break-all; }

        /* KHU VỰC TẬP TIN (DẠNG DANH SÁCH BẢNG) */
        .file-list-container { background: #1a1a1a; border-radius: 12px; overflow: hidden; border: 1px solid #333; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #333; color: var(--glam-gold); padding: 18px; text-align: left; font-size: 16px; }
