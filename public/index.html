<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hệ thống Tài liệu GLAM</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --accent: #ffcc00; --bg: #121212; --card: #1e1e1e; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; }
        
        /* Tiêu đề công ty */
        .header { background: var(--card); padding: 30px; text-align: center; border-bottom: 4px solid var(--accent); }
        .header h1 { color: var(--accent); margin: 0; font-size: 32px; letter-spacing: 1px; }
        .header p { color: var(--accent); margin: 5px 0 0; font-size: 20px; }

        .container { max-width: 1200px; margin: 20px auto; padding: 0 20px; }
        
        /* Thanh dẫn đường */
        .breadcrumb { background: #222; padding: 12px; border-radius: 8px; margin-bottom: 25px; color: var(--accent); font-size: 16px; border: 1px solid #333; }
        .breadcrumb span { cursor: pointer; text-decoration: underline; margin-right: 5px; }

        /* Lưới thư mục (Ô vuông lớn như cũ) */
        .folder-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .folder-box { background: var(--card); padding: 30px; border-radius: 15px; text-align: center; border: 2px solid #333; cursor: pointer; transition: 0.3s; }
        .folder-box:hover { border-color: var(--accent); transform: translateY(-5px); background: #252525; }
        .folder-box i { font-size: 55px; color: var(--accent); margin-bottom: 15px; display: block; }
        .folder-name { font-weight: bold; font-size: 16px; color: white; word-break: break-all; }

        /* Danh sách file bên dưới */
        .file-section-title { color: var(--accent); border-left: 4px solid var(--accent); padding-left: 10px; margin-bottom: 15px; font-size: 20px; }
        .file-list { background: #1a1a1a; border-radius: 12px; overflow: hidden; border: 1px solid #333; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #333; color: var(--accent); padding: 15px; text-align: left; }
        td { padding: 15px; border-bottom: 1px solid #222; }
        .btn-view { color: white; background: #007bff; padding: 6px 15px; border-radius: 5px; text-decoration: none; font-size: 13px; font-weight: bold; }
        .btn-view:hover { background: #0056b3; }
    </style>
</head>
<body>

<div class="header">
    <h1>CÔNG TY TNHH ĐIỆN TỬ GLAM</h1>
    <p>格琳电子有限公司</p>
</div>

<div class="container">
    <div class="breadcrumb" id="bc-path">Vị trí: <span onclick="nav('')">Thư mục gốc</span></div>

    <div class="folder-grid" id="folder-grid"></div>

    <div class="file-section-title"><i class="fas fa-file-alt"></i> DANH SÁCH TÀI LIỆU</div>
    <div class="file-list">
        <table>
            <thead>
                <tr>
                    <th>Tên tập tin</th>
                    <th width="100">Thao tác</th>
                </tr>
            </thead>
            <tbody id="file-list"></tbody>
        </table>
    </div>
</div>

<script>
    let currentPath = "";

    async function nav(path) {
        currentPath = path;
        
        // Cập nhật Breadcrumb
        const bc = document.getElementById('bc-path');
        bc.innerHTML = 'Vị trí: <span onclick="nav(\'\')">Gốc</span>';
        let step = "";
        path.split('/').filter(p => p).forEach(p => {
            step += (step ? '/' : '') + p;
            const target = step;
            bc.innerHTML += ` / <span onclick="nav('${target.replace(/'/g, "\\'")}')">${p}</span>`;
        });

        // Gọi API lấy dữ liệu
        const res = await fetch(`/api/list/${encodeURIComponent(path)}`);
        const items = await res.json();
        
        const folderGrid = document.getElementById('folder-grid');
        const fileList = document.getElementById('file-list');
        
        // Phân loại Folder và File
        const folders = items.filter(i => i.isDir);
        const files = items.filter(i => !i.isDir);

        // Hiển thị Thư mục thành ô vuông lớn
        folderGrid.innerHTML = folders.map(f => {
            const fullPath = currentPath ? `${currentPath}/${f.name}` : f.name;
            const safePath = fullPath.replace(/'/g, "\\'");
            return `
                <div class="folder-box" onclick="nav('${safePath}')">
                    <i class="fas fa-folder"></i>
                    <div class="folder-name">${f.name}</div>
                </div>`;
        }).join('');

        // Hiển thị File vào bảng bên dưới
        fileList.innerHTML = files.map(f => {
            const fullPath = currentPath ? `${currentPath}/${f.name}` : f.name;
            return `
                <tr>
                    <td><i class="fas fa-file-pdf" style="margin-right:10px; color:#ff4444;"></i>${f.name}</td>
                    <td><a href="/api/view/${encodeURIComponent(fullPath)}" target="_blank" class="btn-view">XEM</a></td>
                </tr>`;
        }).join('');
        
        if(files.length === 0) {
            fileList.innerHTML = '<tr><td colspan="2" style="text-align:center; color:#666;">Không có tệp tin nào trong thư mục này</td></tr>';
        }
    }

    // Khởi động
    nav("");
</script>
</body>
</html>
