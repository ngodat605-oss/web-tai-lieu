<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản lý hồ sơ GLAM</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --glam-gold: #ffcc00; --dark-bg: #121212; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark-bg); color: #fff; margin: 0; }
        .header { background: #1e1e1e; padding: 25px; text-align: center; border-bottom: 3px solid var(--glam-gold); }
        .container { max-width: 1000px; margin: 20px auto; padding: 0 20px; }
        
        /* Thanh dẫn đường */
        .breadcrumb { background: #252525; padding: 12px; border-radius: 8px; margin-bottom: 20px; color: var(--glam-gold); font-size: 14px; }
        .breadcrumb span { cursor: pointer; text-decoration: underline; margin: 0 5px; }
        .breadcrumb span:hover { color: #fff; }

        /* Lưới hiển thị Folder/File */
        .explorer { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 20px; }
        .box { background: #1a1a1a; padding: 15px; border-radius: 12px; text-align: center; cursor: pointer; border: 1px solid #333; position: relative; transition: 0.2s; }
        .box:hover { border-color: var(--glam-gold); transform: translateY(-3px); }
        .box i { font-size: 45px; display: block; margin-bottom: 10px; }
        .fa-folder { color: var(--glam-gold); }
        .fa-file-alt { color: #888; }
        .name { font-size: 13px; line-height: 1.3; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; word-break: break-all; }
        
        .btn-x { position: absolute; top: 5px; right: 5px; background: none; border: none; color: #ff4444; opacity: 0; cursor: pointer; }
        .box:hover .btn-x { opacity: 1; }
    </style>
</head>
<body>

<div class="header">
    <h1 style="color:var(--glam-gold); margin:0;">CÔNG TY TNHH ĐIỆN TỬ GLAM</h1>
    <div style="color:var(--glam-gold); margin-top:5px;">格琳电子有限公司</div>
</div>

<div class="container">
    <div class="breadcrumb" id="breadcrumb">Vị trí: <span onclick="go('')">Gốc (uploads)</span></div>
    <div class="explorer" id="explorer"></div>
</div>

<script>
    let currentPath = "";

    async function go(path) {
        currentPath = path;
        
        // 1. Cập nhật thanh dẫn đường (Breadcrumb)
        const bc = document.getElementById('breadcrumb');
        bc.innerHTML = 'Vị trí: <span onclick="go(\'\')">Gốc (uploads)</span>';
        let parts = path.split('/').filter(p => p);
        let stepPath = "";
        parts.forEach(p => {
            stepPath += (stepPath ? '/' : '') + p;
            const target = stepPath;
            bc.innerHTML += ` / <span onclick="go('${target.replace(/'/g, "\\'")}')">${p}</span>`;
        });

        // 2. Tải danh sách từ Server
        const res = await fetch(`/api/list/${encodeURIComponent(path)}`);
        const items = await res.json();
        
        const div = document.getElementById('explorer');
        div.innerHTML = items.map(item => {
            const full = path ? `${path}/${item.name}` : item.name;
            const safe = full.replace(/'/g, "\\'");
            
            return `
                <div class="box" onclick="${item.isDir ? `go('${safe}')` : `view('${safe}')`}">
                    <button class="btn-x" onclick="event.stopPropagation(); del('${safe}')">
                        <i class="fas fa-times-circle"></i>
                    </button>
                    <i class="fas ${item.isDir ? 'fa-folder' : 'fa-file-alt'}"></i>
                    <div class="name">${item.name}</div>
                </div>
            `;
        }).join('');
    }

    function view(p) { window.open(`/api/view/${encodeURIComponent(p)}`, '_blank'); }

    async function del(p) {
        if(confirm("Bạn có chắc chắn muốn xóa mục này?")) {
            await fetch(`/api/delete/${encodeURIComponent(p)}`, { method: 'DELETE' });
            go(currentPath);
        }
    }

    // Khởi động tại thư mục gốc
    go("");
</script>
</body>
</html>
