<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Upload tài liệu</title>
</head>
<body>

<h2>Upload tài liệu</h2>

<input type="file" id="file">
<button onclick="upload()">Upload</button>

<hr>

<ul id="list"></ul>

<script>

async function upload() {
    let file = document.getElementById('file').files[0];

    let form = new FormData();
    form.append('file', file);

    await fetch('/upload', {
        method: 'POST',
        body: form
    });

    load();
}

async function load() {
    let res = await fetch('/files');
    let data = await res.json();

    let list = document.getElementById('list');
    list.innerHTML = '';

    data.forEach(f => {

        // FIX quan trọng để mở file tiếng Trung / ký tự đặc biệt
        let url = "/files/" + encodeURIComponent(f);

        list.innerHTML += `
        <li>
            <a href="${url}" target="_blank">${f}</a>
        </li>`;
    });
}

load();

</script>

</body>
</html>
